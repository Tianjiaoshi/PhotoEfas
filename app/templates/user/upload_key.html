{% extends "base.html" %}
{% block title %}我的密钥{% endblock %}

{% block content %}
<h1>我的密钥</h1>

<div class="info-box">
    <p>管理员会将密钥对的<strong>RSA私钥</strong>和<strong>SM2公钥</strong>提供给您，用于验证图片水印。</p>
    <p>私钥仅在验证时使用，不会存储在服务器上（除非您主动保存）。</p>
</div>

<form method="POST">
    <div class="form-group">
        <label for="sm2_public_key">SM2公钥（用于验签）</label>
        <textarea id="sm2_public_key" name="sm2_public_key" rows="3"
                  placeholder="粘贴SM2公钥hex字符串...">{{ existing_key.sm2_public_key if existing_key else '' }}</textarea>
    </div>

    <div class="form-group">
        <label for="rsa_private_key">RSA私钥（用于解密）</label>
        <textarea id="rsa_private_key" name="rsa_private_key" rows="6"
                  placeholder="粘贴RSA私钥PEM内容...">{{ existing_key.rsa_private_key_encrypted if existing_key else '' }}</textarea>
    </div>

    <button type="submit" class="btn btn-primary">保存密钥</button>
</form>

{% if existing_key %}
<div class="info-box success">
    <p>已保存密钥 - SM2公钥: <code>{{ existing_key.sm2_public_key[:32] }}...</code></p>
</div>
{% endif %}
{% endblock %}
